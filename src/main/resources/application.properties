# Database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:assignment;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=update

# Artemis
quarkus.artemis.url=tcp://artemis:61616
quarkus.artemis.username=artemis
quarkus.artemis.password=artemis

# Artemis Dev Services (optional, but good to disable if we use our own)
quarkus.artemis.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
